<!DOCTYPE html>
<html>
<head>
<title>Result Card</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #4e73df, #36b9cc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 25px;
    width: 420px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th {
    background: #4e73df;
    color: white;
    padding: 8px;
}
td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}
.result {
    background: #36b9cc;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
}
.btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: #4e73df;
    color: white;
    border-radius: 5px;
}
</style>
</head>
<body>

<div class="card">
<h2>📊 Result Card</h2>
<h3>Student Name: {{name}}</h3>

<table>
<tr>
<th>Subject</th>
<th>Marks</th>
</tr>
<tr><td>Subject 1</td><td>{{m1}}</td></tr>
<tr><td>Subject 2</td><td>{{m2}}</td></tr>
<tr><td>Subject 3</td><td>{{m3}}</td></tr>
<tr><td>Subject 4</td><td>{{m4}}</td></tr>
<tr><td>Subject 5</td><td>{{m5}}</td></tr>
</table>

<p>Total Marks: {{total}}</p>
<p>Percentage: {{percentage}}%</p>
<p>Average Mark: {{average}}</p>
<p>Grade: {{grade}}</p>

<div class="result">
RESULT: {{status}}
</div>

<a href="/home"><button class="btn">Back</button></a>

</div>

</body>
</html>
