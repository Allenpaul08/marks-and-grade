<!DOCTYPE html>
<html>
<head>
<title>All Students</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #4e73df, #36b9cc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    width: 650px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4e73df;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f2f2f2;
}

.btn {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background: #4e73df;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="card">
<h2>📋 All Students</h2>

<table>
<tr>
<th>Name</th>
<th>Total</th>
<th>Percentage</th>
<th>Grade</th>
<th>Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

<a href="/home"><button class="btn">Back</button></a>

</div>

</body>
</html>
