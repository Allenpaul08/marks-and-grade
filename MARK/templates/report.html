<!DOCTYPE html>
<html>
<head>
<title>Student Report</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #4e73df, #36b9cc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

.info {
    font-size: 18px;
    margin: 10px 0;
}

.btn {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background: #4e73df;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="card">
<h2>📄 Student Report</h2>

<div class="info">Attendance: 90%</div>
<div class="info">Behaviour: Good</div>
<div class="info">Teacher Remark: Keep Improving</div>

<a href="/home"><button class="btn">Back</button></a>

</div>

</body>
</html>
